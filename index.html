<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Ekstrakurikuler Drumband</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --bg-color: #f0f9ff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            color: var(--text-main);
            margin: 0;
            padding: 30px 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .form-container {
            background: var(--card-bg);
            max-width: 650px;
            width: 100%;
            padding: 45px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h2 {
            margin: 0 0 10px 0;
            color: var(--primary);
            font-size: 26px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 20px;
        }

        .form-row .form-group {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #334155;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 14px;
            font-family: inherit;
            background-color: #f8fafc;
            transition: all 0.3s ease;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.2);
        }

        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .alert {
            padding: 16px;
            margin-bottom: 25px;
            border-radius: 10px;
            display: none;
            text-align: center;
            font-weight: 500;
            font-size: 14px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background-color: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .footer {
            position: relative;
            padding-block: 5rem 2rem;
            text-align: center;
            row-gap: 2rem;
            overflow: hidden;
            color:#64748b
        }

        .footer-copy {
            color: var(--title-color);
        }

        .footer-copy span {
            color: var(--first-color);
        }

        .footer-year span {
            font-family: var(--second-font);
        }


        @media (max-width: 600px) {
            .form-container {
                padding: 30px 20px;
            }

            .form-row {
                flex-direction: column;
                gap: 0;
            }

            .header h2 {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>

    <div class="form-container">
        <div class="header">
            <h2>Formulir Pendaftaran Ekstra Drumband SMEGRIDA</h2>
            <p>Silakan isi data diri Anda dengan lengkap dan benar.</p>
        </div>

        <div class="alert alert-success" id="success-alert">
            🎵 Mantap! Data pendaftaran Anda berhasil terkirim.
        </div>

        <form name="form-pendaftaran" id="form-pendaftaran">
            <div class="form-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="kelas">Kelas</label>
                    <select id="kelas" name="kelas" required>
                        <option value="" disabled selected>Pilih Kelas</option>
                        <option value="X">Kelas X</option>
                        <option value="XI">Kelas XI</option>
                        <option value="XII">Kelas XII</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="jurusan">Jurusan</label>
                    <select id="jurusan" name="jurusan" required>
                        <option value="" disabled selected>Pilih Jurusan</option>
                        <option value="MP">Manajemen Perkantoran (MP)</option>
                        <option value="AKL">Akuntansi & Keuangan Lembaga (AKL)</option>
                        <option value="DKV">Desain Komunikasi Visual (DKV)</option>
                        <option value="RPL">Rekayasa Perangkat Lunak (RPL)</option>
                        <option value="TJAT">Teknik Jaringan Akses Telekomunikasi (TJAT)</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="tempat_lahir">Tempat Lahir</label>
                    <input type="text" id="tempat_lahir" name="tempat_lahir" placeholder="Kota kelahiran" required>
                </div>
                <div class="form-group">
                    <label for="tanggal_lahir">Tanggal Lahir</label>
                    <input type="date" id="tanggal_lahir" name="tanggal_lahir" required>
                </div>
            </div>

            <div class="form-group">
                <label for="no_hp">No. HP / WhatsApp</label>
                <input type="tel" id="no_hp" name="no_hp" placeholder="Contoh: 081234567890" required>
            </div>

            <div class="form-group">
                <label for="alamat">Alamat Lengkap</label>
                <textarea id="alamat" name="alamat" placeholder="Nama Jalan, RT/RW, Kelurahan/Desa..."
                    required></textarea>
            </div>

            <div class="form-group">
                <label for="divisi_alat">Pilihan Divisi Alat</label>
                <select id="divisi_alat" name="divisi_alat" required>
                    <option value="" disabled selected>Pilih alat yang diminati</option>
                    <option value="Snare Drum">Snare Drum</option>
                    <option value="Bass Drum">Bass Drum</option>
                    <option value="Quintom">Quintom</option>
                    <option value="Bellyra">Bellyra</option>
                    <option value="Color Guard">Color Guard</option>
                    <option value="Simbal">Simbal</option>
                </select>
            </div>

            <div class="form-group">
                <label for="alasan">Alasan Bergabung</label>
                <textarea id="alasan" name="alasan"
                    placeholder="Ceritakan singkat motivasi Anda bergabung di Drumband SMEGRIDA" required></textarea>
            </div>

            <button type="submit" id="btn-submit">Kirim Pendaftaran</button>
        </form>
        <!-- FOOTER -->
    <footer class="footer grid">

        <div class="footer-copy">
            All Rights Reserved By <span>Bima Ardiansyah</span>
        </div>

        <div class="footer-year">
            &#169; <span id="footer-year">2026</span>
        </div>
    </footer>
    </div>


    

    <script>
        // GANTI URL INI DENGAN URL DEPLOYMENT BARU ANDA
        const scriptURL = 'https://script.google.com/macros/s/AKfycby-ulqZysA1NBlKS4WrtH7Y_UoCcnmqDZw59T9coV0zkEG4nnZkTO5N49bmTJypODqQqg/exec';

        const form = document.forms['form-pendaftaran'];
        const btnSubmit = document.getElementById('btn-submit');
        const alertSuccess = document.getElementById('success-alert');

        form.addEventListener('submit', e => {
            e.preventDefault();

            // Ubah tampilan tombol saat proses kirim
            btnSubmit.innerHTML = 'Mempersiapkan Alat... 🥁';
            btnSubmit.disabled = true;

            fetch(scriptURL, { method: 'POST', body: new FormData(form), mode: 'no-cors' })
                .then(() => {
                    // Munculkan notifikasi sukses
                    alertSuccess.style.display = 'block';
                    form.reset(); // Kosongkan inputan
                    btnSubmit.innerHTML = 'Kirim Pendaftaran';
                    btnSubmit.disabled = false;

                    // Sembunyikan notifikasi setelah 5 detik
                    setTimeout(() => {
                        alertSuccess.style.display = 'none';
                    }, 5000);
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert('Maaf, terjadi kesalahan. Silakan coba lagi.');
                    btnSubmit.innerHTML = 'Kirim Pendaftaran';
                    btnSubmit.disabled = false;
                });
        });
    </script>
</body>

</html>
